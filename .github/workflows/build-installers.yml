name: Build installers

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  schedule:
    # Monday morning in Sydney (08:17 AEST / 09:17 AEDT).
    - cron: "17 22 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  verify-version:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Require a tag matching package.json
        if: github.ref_type == 'tag'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "$expected" ]]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $expected." >&2
            exit 1
          fi

  windows:
    name: Windows x64
    needs: verify-version
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Python runtime downloads
        uses: actions/cache@v5
        with:
          path: build/cache
          key: windows-python-runtime-${{ hashFiles('requirements.txt', 'tools/prepare_python_runtime.ps1') }}

      - name: Prepare bundled Python
        shell: pwsh
        run: .\tools\prepare_python_runtime.ps1

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Write Windows checksums
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem -LiteralPath release -Filter "*.exe" -File
            Get-ChildItem -LiteralPath release -Filter "*.exe.blockmap" -File
            Get-Item -LiteralPath release/latest.yml -ErrorAction SilentlyContinue
          ) | Sort-Object Name
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          [System.IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path release) "SHA256SUMS-windows.txt"),
            $lines,
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: JSE-windows-x64-${{ github.run_number }}
          if-no-files-found: error
          overwrite: true
          retention-days: 30
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
            release/SHA256SUMS-windows.txt

  macos:
    name: macOS ${{ matrix.label }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            arch: arm64
          - label: Intel
            runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Python runtime downloads
        uses: actions/cache@v5
        with:
          path: build/cache
          key: macos-${{ matrix.arch }}-python-runtime-${{ hashFiles('requirements.txt', 'tools/prepare_python_runtime_mac.sh') }}

      - name: Prepare bundled Python
        shell: bash
        env:
          ARCHS: ${{ matrix.arch }}
        run: bash ./tools/prepare_python_runtime_mac.sh

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build macOS packages
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          npm run build
          npx electron-builder --mac dmg zip --"$TARGET_ARCH"

      - name: Write macOS checksums
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          if [[ -f "release/latest-mac.yml" ]]; then
            mv "release/latest-mac.yml" "release/latest-mac-${TARGET_ARCH}.yml"
          fi
          cd release
          find . -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest-mac-*.yml' \) \
            -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 \
            | sed 's#  \./#  #' > "SHA256SUMS-macos-${TARGET_ARCH}.txt"

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: JSE-macos-${{ matrix.arch }}-${{ github.run_number }}
          if-no-files-found: error
          overwrite: true
          retention-days: 30
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac-*.yml
            release/SHA256SUMS-macos-*.txt

  macos-metadata:
    name: Combine macOS update metadata
    if: github.ref_type == 'tag'
    needs: macos
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS packages
        uses: actions/download-artifact@v4
        with:
          pattern: JSE-macos-*
          path: macos

      - name: Combine architecture metadata
        shell: ruby {0}
        run: |
          require "fileutils"
          require "yaml"

          paths = Dir["macos/**/latest-mac-*.yml"].sort
          abort "Expected metadata for both macOS architectures" unless paths.length == 2

          documents = paths.map { |path| YAML.unsafe_load_file(path) }
          combined = documents.find { |document| document.fetch("path", "").include?("arm64") } || documents.first
          combined["files"] = documents.flat_map { |document| document.fetch("files", []) }
            .uniq { |file| file["url"] }

          FileUtils.mkdir_p("release")
          File.write("release/latest-mac.yml", YAML.dump(combined))

      - name: Upload combined macOS metadata
        uses: actions/upload-artifact@v4
        with:
          name: JSE-macos-metadata-${{ github.run_number }}
          if-no-files-found: error
          overwrite: true
          retention-days: 30
          path: release/latest-mac.yml

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs:
      - windows
      - macos
      - macos-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: JSE-*
          path: release
          merge-multiple: true

      - name: Create prerelease and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" release/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "JSE ${RELEASE_TAG#v}" \
              --generate-notes \
              --latest \
              --verify-tag
          fi
